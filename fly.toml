# Fly.io Configuration for genderize-api
# Generated for deployment to Paris (cdg) region

app = 'genderize-api'
primary_region = 'cdg'

[build]
dockerfile = 'Dockerfile'

[env]
PORT = '8080'
DEBUG = 'false'

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = 'off'
auto_start_machines = true
min_machines_running = 1
processes = ['app']

[[vm]]
size = 'shared-cpu-1x'
memory = '256mb'

[deploy]
strategy = 'rolling'
